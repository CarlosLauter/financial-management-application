<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
</head>

<body>
    <div class="container-perfil">

        <div class="perfil-topo">
            <img src="assets/images/usuario.jpg" alt="img-usuario" id="user-image">

            <div class="info-perfil">
                <h2>Manoel Gomes</h2>
                <p>manoelgomes@gmail.com</p>
            </div>
        </div>

        <div class="user-options">
            <button>
                <i class='bx bx-user'></i>
                <div>
                    <span>Dados Pessoais</span>
                    <p>Informações de contato e documentos</p>
                </div>
            </button>

            <button>
                <i class='bx bx-check-shield'></i>
                <div>
                    <span>Segurança e Privacidade</span>
                    <p>Configurações de senha e proteção</p>
                </div>
            </button>

            <button>
                <i class='bx bx-bell'></i>
                <div>
                    <span>Notificações</span>
                    <p>Preferências de alerta</p>
                </div>
            </button>

            <button>
                <i class='bx bxs-credit-card'></i>
                <div>
                    <span>Conta e Limites</span>
                    <p>Dados de conta e limites de transação</p>
                </div>
            </button>

            <button>
                <i class='bx bx-credit-card'></i>
                <div>
                    <span>Meus Cartões</span>
                    <p>Gerenciar cartões</p>
                </div>
            </button>

            <button>
                <i class='bx bxs-help-circle'></i>
                <div>
                    <span>Suporte e Ajuda</span>
                    <p>Central de atendimento</p>
                </div>
            </button>
        </div>

    </div>
</body>

</html>
