<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Card View</title>
</head>

<body>
    <div>
        <h1 style="color: beige; margin-left: 20px;">Meus cartões</h1>
    </div>
    <div class="bank-card nubank">
        <div class="card-circle-1"></div>
        <div class="card-circle-2"></div>

        <div class="card-top">
            <span class="card-bank-name">Nubank</span>
            <div class="chip">
                <div class="chip-cell"></div>
                <div class="chip-cell"></div>
                <div class="chip-cell"></div>
                <div class="chip-cell"></div>
                <div class="chip-cell"></div>
                <div class="chip-cell"></div>
            </div>
        </div>

        <div class="card-number">•••• •••• •••• 4832</div>

        <div class="card-bottom">
            <div class="card-info-group">
                <span class="card-info-label">Titular</span>
                <span class="card-info-value">Carlos Douglas</span>
            </div>
            <div class="card-info-group">
                <span class="card-info-label">Validade</span>
                <span class="card-info-value">09/27</span>
            </div>
            <span class="card-brand">VISA</span>
        </div>
    </div>

    <div class="details-row">
        <div class="detail-pill">
            <span class="detail-pill-label">CVV</span>
            <span class="detail-pill-value" id="cvv-nu">
                •••
            </span>
        </div>
        <div class="detail-pill">
            <span class="detail-pill-label">Limite</span>
            <span class="detail-pill-value">R$ 8.500</span>
        </div>
        <div class="detail-pill">
            <span class="detail-pill-label">Disponível</span>
            <span class="detail-pill-value green">R$ 5.230</span>
        </div>
    </div>
</body>

</html>
